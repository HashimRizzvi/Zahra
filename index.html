<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zahra's Day</title>
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --bg: #08080a;
            --accent: #b197fc;
            --secondary: #63e6be;
            --text: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- MODERN MESH GRADIENT BACKGROUND --- */
        .mesh {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%), 
                radial-gradient(at 0% 100%, hsla(200,45%,25%,1) 0, transparent 50%);
            filter: blur(80px);
            opacity: 0.6;
        }

        /* --- INITIAL UNLOCK SCREEN --- */
        #unlock-screen {
            position: absolute;
            z-index: 10;
            text-align: center;
            transition: all 1s cubic-bezier(0.8, 0, 0.2, 1);
        }

        .gift-trigger {
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.4s;
            font-size: 2rem;
            box-shadow: 0 0 30px rgba(177, 151, 252, 0.2);
        }

        .gift-trigger:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
            box-shadow: 0 0 50px rgba(177, 151, 252, 0.4);
        }

        .unlock-hint {
            margin-top: 20px;
            letter-spacing: 4px;
            font-size: 0.7rem;
            text-transform: uppercase;
            opacity: 0.5;
        }

        /* --- MAIN CONTENT (HIDDEN) --- */
        #main-container {
            display: none;
            opacity: 0;
            transform: translateY(30px);
            text-align: center;
            width: 90%;
            max-width: 600px;
        }

        .pic-container {
            position: relative;
            margin-bottom: 40px;
        }

        .zahra-pic {
            width: 280px;
            height: 280px;
            object-fit: cover;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            transform: rotate(-2deg);
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(3rem, 10vw, 5rem);
            line-height: 0.9;
            margin-bottom: 20px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .message {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 30px;
            font-weight: 300;
        }

        .party-tag {
            display: inline-block;
            background: var(--accent);
            color: #000;
            padding: 10px 25px;
            border-radius: 100px;
            font-weight: 800;
            font-size: 1.1rem;
            margin-top: 20px;
            transform: skewX(-10deg);
            transition: 0.3s;
            cursor: pointer;
        }

        .party-tag:hover {
            transform: skewX(-10deg) scale(1.1);
            box-shadow: 0 0 30px var(--accent);
        }

        /* Transitions */
        .fade-out { opacity: 0 !important; transform: scale(1.5) !important; pointer-events: none; }
        .fade-in { display: block !important; animation: slideUp 1.2s forwards cubic-bezier(0.16, 1, 0.3, 1); }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .floating { animation: float 4s infinite ease-in-out; }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }
    </style>
</head>
<body>

    <div class="mesh"></div>

    <!-- Background Music -->
    <audio id="music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <!-- STEP 1: CLICK TO UNLOCK -->
    <div id="unlock-screen">
        <div class="gift-trigger" onclick="reveal()">🎁</div>
        <p class="unlock-hint">For Zahra</p>
    </div>

    <!-- STEP 2: THE REVEAL -->
    <div id="main-container">
        <div class="pic-container floating">
            <img src="zahra.jpg" alt="Funny Zahra" class="zahra-pic">
        </div>

        <h1>HAPPY<br>BIRTHDAY.</h1>
        <p class="message">Stay happy, stay weird, and keep being you.</p>
        
        <div class="party-tag" onclick="confettiLoop()">SO... WHERE'S THE PARTY? 🎂</div>
    </div>

    <script>
        function reveal() {
            // Play Music
            const m = document.getElementById('music');
            m.volume = 0.5;
            m.play();

            // Transition Screens
            document.getElementById('unlock-screen').classList.add('fade-out');
            
            setTimeout(() => {
                document.getElementById('main-container').classList.add('fade-in');
                confettiEffect();
            }, 600);
        }

        function confettiEffect() {
            var count = 200;
            var defaults = { origin: { y: 0.7 } };

            function fire(particleRatio, opts) {
                confetti(Object.assign({}, defaults, opts, {
                    particleCount: Math.floor(count * particleRatio)
                }));
            }

            fire(0.25, { spread: 26, startVelocity: 55 });
            fire(0.2, { spread: 60 });
            fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
            fire(0.1, { spread: 120, startVelocity: 25, decay: 0.92, scalar: 1.2 });
            fire(0.1, { spread: 120, startVelocity: 45 });
        }

        function confettiLoop() {
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#b197fc', '#63e6be', '#ffffff']
            });
        }
    </script>
</body>
</html>
